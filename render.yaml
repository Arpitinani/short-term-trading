services:
  - type: web
    name: trading-api
    runtime: python
    buildCommand: pip install -r requirements.txt && pip install -e .
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALPACA_API_KEY
        sync: false
      - key: ALPACA_SECRET_KEY
        sync: false
      - key: ALPACA_PAPER
        value: "true"
      - key: SLACK_WEBHOOK_URL
        sync: false
    healthCheckPath: /
    plan: free
